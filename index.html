<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>
<style>
    body{
        background:#ffe6f2;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }
    .card{
        background:white;
        padding:30px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 0 20px rgba(0,0,0,.2);
    }
    h1{
        color:#ff4d6d;
    }
    button{
        background:#ff4d6d;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Hai Sayang ❤️</h1>
    <p id="pesan">
        Kamu tahu nggak?
        <br><br>
        Kalau hidupku itu program,
        maka kamu adalah <b>main()</b> yang selalu menjalankan kebahagiaanku.
    </p>

    <button onclick="gombal()">Klik Aku</button>
</div>

<script>
function gombal(){
    alert("I Love You ❤️\n\nError 404: Hati ini tidak menemukan orang lain selain kamu.");
}
</script>

</body>
</html>
